<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Smart Waste Segregation - Phase 1</title>

    <!-- ✅ FIXED: A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- ✅ FIXED: AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* ── your existing styles ── */
        .overlay-controls {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(12, 18, 34, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
            z-index: 9999;
            backdrop-filter: blur(12px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .overlay-button {
            min-width: 170px;
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00a8ff 0%, #0066ff 100%);
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 10px 24px rgba(0, 104, 255, 0.22);
        }

        .overlay-button:hover,
        .overlay-button:focus {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(0, 104, 255, 0.30);
            opacity: 0.98;
        }

        .overlay-button.secondary {
            background: linear-gradient(135deg, #2cd18a 0%, #1d9a6b 100%);
            box-shadow: 0 10px 24px rgba(45, 189, 122, 0.22);
        }

        .overlay-button.danger {
            background: linear-gradient(135deg, #ff4d6d 0%, #d9274e 100%);
            box-shadow: 0 10px 24px rgba(255, 77, 109, 0.22);
        }

        .marker-warning {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 18px;
            border-radius: 14px;
            background: rgba(255, 95, 45, 0.12);
            border: 1px solid rgba(255, 136, 58, 0.24);
            color: #ff9b44;
            font-weight: 700;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.16);
            backdrop-filter: blur(12px);
            z-index: 9999;
        }

        .status-panel {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 220px;
            padding: 16px 18px;
            border-radius: 20px;
            background: rgba(10, 18, 37, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
            z-index: 9999;
        }

        .status-panel h4 {
            margin: 0 0 10px;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #9ad4ff;
        }

        .status-panel p {
            margin: 6px 0;
            font-size: 1rem;
            line-height: 1.4;
        }

        .instructions-banner {
            position: fixed;
            left: 50%;
            bottom: 96px;
            transform: translateX(-50%);
            max-width: 92%;
            width: 520px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-radius: 18px;
            background: rgba(10, 24, 52, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #f5f9ff;
            font-size: 0.95rem;
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(16px);
            z-index: 9999;
        }

        .instructions-banner span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #e8f4ff;
        }

        .instructions-close {
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .instructions-close:hover,
        .instructions-close:focus {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.16);
        }

        /* hide A-Frame's default loading screen */
        .a-loader-title {
            display: none !important;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- ─── Warnings & Status ─── -->
    <div id="marker-warning" class="marker-warning" role="alert">
        ⚠️ Point camera at Hiro Marker
    </div>

    <div class="status-panel" aria-label="Simulation status panel">
        <h4>Status Panel</h4>
        <p id="items-scanned">Items Scanned: 0</p>
        <p id="eco-score">Eco-Score: 100 points</p>
    </div>

    <div id="instructions-banner" class="instructions-banner" role="status">
        <span>💡 Step 1: Scan Hiro Marker | Step 2: Tap an item below to simulate sorting.</span>
        <button id="close-instructions" class="instructions-close" aria-label="Dismiss instructions">×</button>
    </div>

    <!-- ─── AR Scene ─── -->
    <!-- ✅ Added `renderer="log: false"` to reduce noise, and `vr-mode-ui="enabled: false"` to hide VR toggle -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        renderer="log: false"
    >

        <!-- Hiro Marker -->
        <a-marker preset="hiro" emitEvents="true">

            <!-- Holographic UI Background -->
            <a-plane position="0 0.1 -1" rotation="-90 0 0" width="3" height="1.5" color="#111111" material="opacity: 0.8; transparent: true"></a-plane>

            <!-- Title -->
            <a-text value="SMART SEGREGATION SYSTEM" position="0 0.2 -1.4" rotation="-90 0 0" align="center" width="4.5" color="#FFFFFF" font="monoid"></a-text>

            <!-- Plastic Bin -->
            <a-box id="plastic-bin" position="-0.8 0.3 -0.8" rotation="0 45 0" depth="0.4" height="0.6" width="0.4" color="#007BFF"
                   animation="property: position; to: -0.8 0.33 -0.8; dir: alternate; dur: 3200; easing: easeInOutSine; loop: true"
                   animation__rot="property: rotation; to: 0 50 0; dir: alternate; dur: 10000; easing: easeInOutSine; loop: true">
                <a-text value="PLASTIC" position="0 0.4 0" rotation="0 0 0" align="center" width="2" color="#FFFFFF"></a-text>
            </a-box>

            <!-- Organic Bin -->
            <a-box id="organic-bin" position="0 0.3 -0.8" rotation="0 45 0" depth="0.4" height="0.6" width="0.4" color="#28A745"
                   animation="property: position; to: 0 0.33 -0.8; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true"
                   animation__rot="property: rotation; to: 0 50 0; dir: alternate; dur: 9500; easing: easeInOutSine; loop: true">
                <a-text value="ORGANIC" position="0 0.4 0" rotation="0 0 0" align="center" width="2" color="#FFFFFF"></a-text>
            </a-box>

            <!-- Hazardous Bin -->
            <a-box id="hazardous-bin" position="0.8 0.3 -0.8" rotation="0 45 0" depth="0.4" height="0.6" width="0.4" color="#DC3545"
                   animation="property: position; to: 0.8 0.33 -0.8; dir: alternate; dur: 3400; easing: easeInOutSine; loop: true"
                   animation__rot="property: rotation; to: 0 50 0; dir: alternate; dur: 10500; easing: easeInOutSine; loop: true">
                <a-text value="HAZARDOUS" position="0 0.4 0" rotation="0 0 0" align="center" width="2" color="#FFFFFF"></a-text>
            </a-box>

            <!-- Instruction text -->
            <a-text value="Scan item barcode to auto-allocate container" position="0 0.2 -0.3" rotation="-90 0 0" align="center" width="3" color="#FFC107"></a-text>

        </a-marker>

        <!-- Fallback camera helper (AR.js adds its own, but this ensures the scene has a camera) -->
        <a-camera></a-camera>

    </a-scene>

    <!-- ─── Controls ─── -->
    <div class="overlay-controls" role="region" aria-label="Simulation controls">
        <button id="simulate-plastic" class="overlay-button" type="button">Simulate Plastic Bottle</button>
        <button id="simulate-organic" class="overlay-button secondary" type="button">Simulate Apple Core</button>
        <button id="simulate-hazardous" class="overlay-button danger" type="button">Simulate Battery</button>
    </div>

    <!-- ─── Script ─── -->
    <script>
        (function() {
            'use strict';

            let itemsScanned = 0;
            let ecoScore = 100;

            const markerWarning = document.getElementById('marker-warning');
            const itemsScannedEl = document.getElementById('items-scanned');
            const ecoScoreEl = document.getElementById('eco-score');
            const plasticBin = document.getElementById('plastic-bin');
            const organicBin = document.getElementById('organic-bin');
            const hazardousBin = document.getElementById('hazardous-bin');
            const instructionsBanner = document.getElementById('instructions-banner');
            const closeInstructionsButton = document.getElementById('close-instructions');

            const uiSound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-positive-interface-click-1116.mp3');
            uiSound.volume = 0.65;

            function updateStatusPanel() {
                itemsScannedEl.textContent = `Items Scanned: ${itemsScanned}`;
                ecoScoreEl.textContent = `Eco-Score: ${ecoScore} points`;
            }

            function animateBinFeedback(binEl, duration = 300) {
                if (!binEl) return;

                const originalColor = binEl.getAttribute('color');
                const originalScale = binEl.getAttribute('scale') || '1 1 1';
                const highlightColor = '#00FF8C';
                let flashCount = 0;

                function flashStep() {
                    if (flashCount >= 6) {
                        binEl.setAttribute('color', originalColor);
                        binEl.setAttribute('scale', originalScale);
                        return;
                    }

                    if (flashCount % 2 === 0) {
                        binEl.setAttribute('color', highlightColor);
                        binEl.setAttribute('scale', '1.08 1.08 1.08');
                    } else {
                        binEl.setAttribute('color', originalColor);
                        binEl.setAttribute('scale', originalScale);
                    }

                    flashCount += 1;
                    setTimeout(flashStep, duration);
                }

                flashStep();
            }

            function registerSimulation(buttonId, binEl, scoreDelta) {
                const button = document.getElementById(buttonId);
                if (!button) return;

                button.addEventListener('click', function() {
                    uiSound.currentTime = 0;
                    uiSound.play().catch(function() { /* ignore autoplay errors */ });
                    animateBinFeedback(binEl);
                    itemsScanned += 1;
                    ecoScore += scoreDelta;
                    updateStatusPanel();
                });
            }

            registerSimulation('simulate-plastic', plasticBin, 10);
            registerSimulation('simulate-organic', organicBin, 10);
            registerSimulation('simulate-hazardous', hazardousBin, 10);

            // ─── Marker detection ───
            const marker = document.querySelector('a-marker');
            if (marker) {
                marker.addEventListener('markerFound', function() {
                    markerWarning.style.display = 'none';
                });
                marker.addEventListener('markerLost', function() {
                    markerWarning.style.display = 'block';
                });
            }

            // ─── Dismiss instructions ───
            if (closeInstructionsButton && instructionsBanner) {
                closeInstructionsButton.addEventListener('click', function() {
                    instructionsBanner.style.display = 'none';
                });
            }

            // ─── Initial status ───
            updateStatusPanel();

            // ─── Console helper for debugging ───
            console.log('✅ AR Waste Segregation initialized.');
            console.log('ℹ️  Make sure you have a Hiro marker visible to the camera.');
        })();
    </script>

</body>
</html>
